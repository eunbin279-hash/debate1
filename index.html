<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>토론마당 냥</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="main-container">
    <div class="yard" id="yard">
      <div id="hurtOverlay" class="hurt-overlay hidden">
        <div class="hurt-msg">고양이가 상처를 받았습니다...</div>
      </div>
      <header class="top">
        <h1>[샤워는 아침에 하는 것보다 저녁에 하는 게 낫다]</h1>
      </header>

      <!-- cats placed around -->
      <div class="cats" id="cats">
        <div class="cat" data-id="user" style="left:50%;bottom:20%;top:auto;transform:translateX(-50%);">
          <div class="bubble-stack"></div>
          <div class="nametag" style="position:absolute;bottom:-30px;left:auto;transform:none;">나</div>
          <img src="img/cat_neutral.png" alt="user cat" class="cat-img"
            style="filter: grayscale(0) hue-rotate(0deg) saturate(100%) brightness(1);">
        </div>
      </div>

      <div class="bottom">
        <div class="nametag">의견 나누기</div>
        <div class="inputwrap">
          <input type="text" id="userInput" placeholder="네 생각은 어때?" maxlength="30" />
          <span id="charCount" style="font-size:12px; color:#888; margin-right:5px;">0/30</span>
          <button id="sendBtn" class="send">외치기</button>
          <button id="simToggleBtn" class="send" style="background:#555; margin-left:5px;">시뮬레이션</button>
        </div>
      </div>
    </div>

    <!-- Persistent Sidebar for My Yard -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>우리 집</h3>
        <p>나를 설득한 친구들</p>
      </div>
      <div id="adoptList" class="adopt-list">아직 없습니다.</div>
    </aside>
  </div>

  <div id="historyModal" class="history-modal hidden">
    <div class="history-card">
      <div id="historyList" class="history-list"></div>
      <button id="historyClose" class="send" style="margin-top:20px;">대화 덮기</button>
    </div>
  </div>

  <!-- 시뮬레이션 모달 -->
  <div id="simModal" class="sim-modal hidden">
    <div class="sim-overlay"></div>
    <div class="sim-scene">
      <div id="simCharacter" class="sim-character hidden">
        <img src="img/grandma.png" alt="할머니"
          style="width:200px; image-rendering: pixelated; display: block; margin-bottom: 25px;">
      </div>
      <div id="simNote" class="sim-note hidden">
        <b>상대 측 의견</b><br><br>
        최근 동물원에 대항 의견이 마니 나옴미다. <br>
        동물의 권리능 보장대야 함미다.<br>
        자연에성 살수업는 경우두 이씁니당.
      </div>
    </div>

    <div class="sim-ui">
      <div id="simSpeaker" class="sim-speaker"></div>
      <div id="simText" class="sim-text"></div>
      <div id="simChoices" class="sim-choices hidden"></div>
      <div id="simNextIndicator" class="sim-next-indicator">▼ Click</div>
    </div>

    <!-- 타이핑 받아적기 UI -->
    <div id="simTypeUI" class="sim-type-ui hidden">
      <div class="sim-type-header">맞춤법 고쳐서 받아적기</div>
      <textarea id="simTypeInput" placeholder="할머니의 쪽지 내용을 올바른 맞춤법으로 다시 적어주세요."></textarea>
      <div class="sim-type-actions">
        <span id="simTypeCount" style="font-size:12px; color:#888;">0/100</span>
        <div>
          <button id="simTypeSubmitBtn" class="sim-type-submit">작성 완료</button>
        </div>
      </div>
    </div>

    <button id="simFinalBtn" class="sim-final-btn hidden">입론하기</button>
  </div>

  <script src="https://debate-md2-2603.web.app/debate-core.js" data-architect-id="ian"></script>
  <script src="app.js"></script>

  <!-- SVG Filters for Sketch/Pencil Effect -->
  <svg style="display: none;">
    <filter id="pencil-sketch" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
</body>

</html>
